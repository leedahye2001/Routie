services:
  postgres:
    image: postgres:16-alpine
    container_name: routie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: routie
      POSTGRES_USER: routie_user
      POSTGRES_PASSWORD: routie_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U routie_user -d routie']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: routie_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@routie.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  minio:
    image: minio/minio:latest
    container_name: routie_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: routie_access_key
      MINIO_ROOT_PASSWORD: routie_secret_key
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # 웹 콘솔
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  pgadmin_data:
  minio_data:
